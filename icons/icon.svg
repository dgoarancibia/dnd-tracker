<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2510"/>
      <stop offset="100%" stop-color="#0e0d09"/>
    </radialGradient>
    <radialGradient id="shieldGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2e2b1c"/>
      <stop offset="100%" stop-color="#161510"/>
    </radialGradient>
  </defs>

  <!-- Fondo circular -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- ESCUDO -->
  <path d="M256,60 L390,100 L390,280 Q390,380 256,450 Q122,380 122,280 L122,100 Z"
        fill="url(#shieldGrad)" stroke="#c9973a" stroke-width="8"/>

  <!-- Borde interior del escudo -->
  <path d="M256,85 L368,118 L368,278 Q368,362 256,422 Q144,362 144,278 L144,118 Z"
        fill="none" stroke="#c9973a" stroke-width="3" opacity="0.5"/>

  <!-- D20 en el escudo (icosaedro visto de frente) -->
  <!-- Triángulo central grande -->
  <polygon points="256,130 310,220 202,220" fill="none" stroke="#c9973a" stroke-width="4"/>
  <!-- Triángulo invertido -->
  <polygon points="256,310 202,220 310,220" fill="none" stroke="#c9973a" stroke-width="4"/>
  <!-- Líneas laterales -->
  <line x1="256" y1="130" x2="175" y2="270" stroke="#c9973a" stroke-width="3" opacity="0.7"/>
  <line x1="256" y1="130" x2="337" y2="270" stroke="#c9973a" stroke-width="3" opacity="0.7"/>
  <line x1="175" y1="270" x2="337" y2="270" stroke="#c9973a" stroke-width="3" opacity="0.7"/>
  <!-- Número 20 -->
  <text x="256" y="235" text-anchor="middle" font-family="serif" font-weight="bold"
        font-size="48" fill="#e0b85a" opacity="0.9">20</text>

  <!-- MAZO (diagonal, esquina superior derecha) -->
  <!-- Mango -->
  <rect x="248" y="50" width="16" height="120" rx="6"
        fill="#8B5E3C" stroke="#5a3a1a" stroke-width="2"
        transform="rotate(40, 256, 150)"/>
  <!-- Cabeza del mazo -->
  <rect x="290" y="55" width="75" height="52" rx="10"
        fill="#aaaaaa" stroke="#888" stroke-width="3"
        transform="rotate(40, 330, 80)"/>
  <!-- Brillo cabeza -->
  <rect x="294" y="60" width="65" height="18" rx="6"
        fill="#cccccc" opacity="0.5"
        transform="rotate(40, 330, 80)"/>
  <!-- Remaches cabeza -->
  <circle cx="308" cy="72" r="5" fill="#c9973a" transform="rotate(40, 330, 80)"/>
  <circle cx="350" cy="72" r="5" fill="#c9973a" transform="rotate(40, 330, 80)"/>

  <!-- Brillo escudo -->
  <path d="M256,70 L340,105 L340,200" fill="none" stroke="white" stroke-width="2" opacity="0.08"/>
</svg>